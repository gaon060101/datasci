<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataLab AI - 공공데이터 연구 어시스턴트</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo"></div>
                <h1>DataLab AI</h1>
            </div>
            
            <button class="new-chat-btn" id="btnNewProject">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                새 연구 프로젝트
            </button>

            <div class="nav-section">
                <h3>최근 연구 기록</h3>
                <ul class="history-list" id="historyList">
                    <!-- Dynamic history will be populated here -->
                </ul>
            </div>
            
            <div class="user-profile">
                <div class="avatar">R</div>
                <div class="user-info">
                    <span class="name">연구자님</span>
                    <span class="plan">Pro Plan</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="topbar">
                <h2 id="projectTitle">연수/고창 석면 건축물 인프라 통합 분석</h2>
                <div class="actions">
                    <button class="btn-secondary" id="btnExport">내보내기</button>
                </div>
            </header>

            <div class="workspace">
                <!-- Chat & Request Area -->
                <section class="chat-area">
                    <div class="chat-history" id="chatHistory">
                        <!-- Default Greeting -->
                        <div class="message ai-message">
                            <div class="msg-icon"><div class="logo-small"></div></div>
                            <div class="msg-content">
                                <div class="msg-text">안녕하세요. 연구자님. 분석하고자 하는 공공데이터 파일(CSV)을 업로드하시거나 목적을 말씀해 주세요.</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="chat-input-wrapper">
                        <!-- Suggestion Chips -->
                        <div class="suggestion-chips" id="suggestionChips">
                            <button class="chip" data-text="두 지자체 데이터를 합치고 시각화해줘.">📊 데이터 시각화</button>
                            <button class="chip" data-text="이 데이터에 결측치나 이상치가 있는지 먼저 검증해줄래?">🔍 결측치 검증</button>
                        </div>

                        <!-- Research Purpose Dropdown (Always visible) -->
                        <div class="purpose-wrapper mb-2" style="display: flex; gap: 0.5rem; align-items: center; background: var(--bg-surface); padding: 0.5rem 1rem; border-radius: 8px; border: 1px solid var(--border-subtle);">
                            <label style="font-size: 0.8rem; color: var(--text-secondary); white-space: nowrap;">연구 목적:</label>
                            <select class="settings-select" id="purposeSelect" style="flex: 1; padding: 0.4rem; font-size: 0.85rem; border: none; background: transparent;">
                                <option value="explore">기본 탐색 및 시각화</option>
                                <option value="correlation">데이터 간의 상관관계 분석</option>
                                <option value="anomaly">이상치 및 결측치 집중 검증 (데이터 정제)</option>
                                <option value="infrastructure" selected>이종 데이터 통합 및 비교 (인프라 격차 분석)</option>
                            </select>
                        </div>

                        <!-- Uploaded Files Display -->
                        <div class="data-attachments" id="attachments" style="display: none;"></div>
                        
                        <div class="input-box">
                            <input type="file" id="fileUpload" accept=".csv" style="display: none;" multiple>
                            <button class="icon-btn tooltip" data-tooltip="데이터 업로드" id="btnUpload">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                            </button>
                            <input type="text" id="promptInput" placeholder="연구 목적에 맞게 데이터 통합 및 시각화를 요청해보세요...">
                            <button class="btn-primary" id="sendBtn">
                                분석 실행
                            </button>
                        </div>
                    </div>
                </section>

                <!-- Analysis Dashboard (Initially Hidden) -->
                <section class="dashboard" id="dashboard">
                    <!-- Dashboard content injected by JS -->
                </section>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <!-- Export Modal -->
    <div class="modal-overlay" id="modalExport">
        <div class="modal">
            <div class="modal-header">
                <h3>결과 내보내기</h3>
                <button class="icon-btn close-modal"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <div class="modal-body">
                <div class="export-options">
                    <label class="export-opt">
                        <input type="radio" name="exportFormat" checked>
                        <div class="opt-content">
                            <strong>PDF 리포트</strong>
                            <span>시각화 차트와 요약을 포함한 문서</span>
                        </div>
                    </label>
                    <label class="export-opt">
                        <input type="radio" name="exportFormat">
                        <div class="opt-content">
                            <strong>CSV (통합본)</strong>
                            <span>전처리 및 병합이 완료된 원시 데이터</span>
                        </div>
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary close-modal">취소</button>
                <button class="btn-primary" id="btnConfirmExport">다운로드 시작</button>
            </div>
        </div>
    </div>



    <!-- Missing Value Data Modal -->
    <div class="modal-overlay" id="modalMissingData">
        <div class="modal modal-lg">
            <div class="modal-header">
                <h3>결측치 원본 행 확인 (석면조사대상_건축물현황.csv)</h3>
                <button class="icon-btn close-modal"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
            </div>
            <div class="modal-body">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>지자체(분석단위)</th>
                            <th>총 데이터 수</th>
                            <th>평균 연면적 (㎡)</th>
                            <th>평균 석면면적 (㎡)</th>
                            <th>안전관리인 지정률</th>
                            <th>결측치 비율</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Dynamic Missing Rows Injected Here -->
                    </tbody>
                </table>
                <p class="text-sm mt-4 text-warning">* 위 데이터들은 면적 값이 비어있거나 비정상적인 값으로 기입되어 결측치/이상치로 분류되었습니다.</p>
            </div>
        </div>
    </div>

    <!-- Templates -->
    <template id="tpl-dashboard">
        <div class="dashboard-header">
            <h3>분석 결과 요약</h3>
            <div class="tabs" id="dashboardTabs">
                <button class="tab-btn active" data-target="tab-overview">📊 시각화 및 통계</button>
                <button class="tab-btn" data-target="tab-data">📋 정제된 통합 데이터</button>
                <button class="tab-btn" data-target="tab-citation">📑 맞춤 해석 & 리포트</button>
            </div>
        </div>

        <!-- Warning Alert -->
        <div class="glass-card alert warning alert-animate mb-4" id="missingValueAlert">
            <div class="alert-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#F59E0B" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            </div>
            <div class="alert-content">
                <h4>데이터 신뢰도 경고: 결측치 및 이상치 감지</h4>
                <p>업로드된 데이터에서 <strong>결측치/이상치</strong>가 발견되었습니다. AI가 통계의 왜곡을 방지하기 위해 임의의 평균값으로 채우지 않고 '정보없음'으로 보존했습니다.</p>
                <div class="alert-actions mt-2">
                    <button class="btn-small btn-outline" id="btnShowMissingData">결측치 원본 상세 확인</button>
                    <button class="btn-small" id="btnExcludeMissingData">결측치 5건 제외 후 차트 재구성</button>
                </div>
            </div>
        </div>

        <!-- Tabs Content -->
        <!-- Tab 1: Overview -->
        <div class="tab-content active" id="tab-overview">
            <div class="dashboard-grid">
                <div class="glass-card col-span-2 slide-up">
                    <div class="card-header">
                        <h3>목적별 다차원 시각화 분석</h3>
                        <div style="font-size: 0.85rem; color: var(--text-secondary);">연구 목적에 최적화된 3가지 지표가 렌더링됩니다.</div>
                    </div>
                    <div class="chart-container" style="display: flex; flex-direction: column; gap: 2rem; height: auto; padding: 1rem 0;">
                        <div style="width: 100%; height: 400px; position: relative;"><canvas id="chart1"></canvas></div>
                        <div style="width: 100%; height: 400px; position: relative;"><canvas id="chart2"></canvas></div>
                        <div style="width: 100%; height: 400px; position: relative;"><canvas id="chart3"></canvas></div>
                    </div>
                </div>

                <div class="glass-card col-span-2 slide-up" style="animation-delay: 0.1s;">
                    <div class="card-header">
                        <h3>상세 통계 요약 (단위: ㎡)</h3>
                    </div>
                    <div class="table-responsive">
                        <table class="data-table text-center">
                            <thead>
                                <tr>
                                    <th>지자체(분석단위)</th>
                                    <th>총 데이터 수</th>
                                    <th>평균 연면적 (㎡)</th>
                                    <th>평균 석면면적 (㎡)</th>
                                    <th>안전관리인 지정률</th>
                                    <th>결측치 비율</th>
                                </tr>
                            </thead>
                            <tbody id="statsTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 2: Data -->
        <div class="tab-content" id="tab-data">
            <div class="glass-card slide-up">
                <div class="card-header">
                    <h3>통합 추출 데이터 (인천 연수구 + 전북 고창군)</h3>
                    <span class="badge">양식 통합 완료</span>
                </div>
                <div class="mb-4">
                    <p class="text-sm" style="color: var(--accent-secondary);">
                        * 연구 목적에 맞춰 두 지자체의 이종 데이터를 통합했습니다.<br>
                        - <strong>연수구:</strong> '주소', '연면적', '석면면적' 컬럼 추출<br>
                        - <strong>고창군:</strong> '소재지', '건축물연면적', '석면자재면적' 컬럼 추출<br>
                        👉 AI가 의미를 파악하여 <strong>'주소'</strong>와 <strong>'석면면적'</strong>이라는 통일된 컬럼으로 정규화 병합했습니다.
                    </p>
                </div>
                <div class="table-responsive">
                    <table class="data-table" id="mergedTable">
                        <thead>
                            <tr><th>지자체</th><th>주소 (정규화됨)</th><th>석면면적 (㎡)</th><th>데이터 원본 소스 컬럼</th></tr>
                        </thead>
                        <tbody>
                            <tr><td>연수구</td><td>인천광역시 연수구 벚꽃로 106</td><td>125.4</td><td>주소 / 석면면적</td></tr>
                            <tr><td>연수구</td><td>인천광역시 연수구 원인재로 115</td><td>85.2</td><td>주소 / 석면면적</td></tr>
                            <tr><td>연수구</td><td>인천광역시 연수구 청능대로 109</td><td>320.0</td><td>주소 / 석면면적</td></tr>
                            <tr><td>고창군</td><td>전북특별자치도 고창군 고창읍 모양성로 1</td><td>45.5</td><td>소재지 / 석면자재면적</td></tr>
                            <tr><td>고창군</td><td>전북특별자치도 고창군 고창읍 중앙로 245</td><td>110.8</td><td>소재지 / 석면자재면적</td></tr>
                            <tr class="highlight-row missing-row"><td>고창군</td><td>전북특별자치도 고창군 아산면 선운사로 250</td><td class="text-warning">정보없음</td><td class="text-warning">결측치 보존 (면적 공란)</td></tr>
                            <tr class="highlight-row missing-row"><td>고창군</td><td>전북특별자치도 고창군 무장면 무장읍성길 10</td><td class="text-warning">정보없음</td><td class="text-warning">결측치 보존 (면적 '-')</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Tab 3: Citation & Explanation -->
        <div class="tab-content" id="tab-citation">
            <div class="glass-card slide-up">
                <div class="card-header">
                    <h3>연구 맞춤 해석 및 인사이트</h3>
                </div>
                <div class="citation-content">
                    <div style="background: rgba(99, 102, 241, 0.1); padding: 1.5rem; border-radius: 8px; border-left: 4px solid var(--accent-primary);">
                        <h4 style="color: #a5b4fc; margin-bottom: 0.75rem;">💡 연구 목적 기반 데이터 해석 (인프라 격차 분석)</h4>
                        <p class="text-sm mb-2">
                            연구자님께서 설정하신 <strong>'이종 데이터 통합 및 비교 (인프라 격차 분석)'</strong> 목적에 따라, 두 지자체의 석면 건축물 '면적' 데이터를 추출하여 비교 분석을 수행했습니다.
                        </p>
                        <ul class="text-sm" style="list-style-position: inside; color: var(--text-secondary); line-height: 1.8;">
                            <li><strong>분석 결과:</strong> 결측치를 제외한 유효 데이터 기준, 연수구의 건축물당 평균 석면면적(185.2㎡)이 고창군(95.0㎡) 대비 약 94% 넒은 것으로 나타났습니다.</li>
                            <li><strong>해석 제안:</strong> 이는 연수구가 고창군에 비해 대형 상가나 공공시설의 규모를 더 크게 조성하는 도시 인프라 특성을 가지고 있거나, 산업단지 관련 시설이 많기 때문일 수 있습니다.</li>
                            <li><strong>추가 연구 방안:</strong> 인프라 격차의 원인을 더 깊이 파악하기 위해, 두 지자체의 '유동 인구 데이터'나 '예산 데이터'를 추가로 업로드하여 교차 분석하실 것을 권장합니다.</li>
                        </ul>
                    </div>

                    <div class="citation-box mt-4">
                        <h5>자동 생성 출처 표기 (APA 양식)</h5>
                        <p class="text-sm mb-2" style="color: var(--text-secondary);">논문이나 보고서에 즉시 활용할 수 있도록 공공데이터포털 정보를 기반으로 출처를 자동 생성했습니다.</p>
                        <p class="citation-text">인천광역시 연수구. (2024). 연수구 석면조사대상 건축물 현황 [데이터 세트]. 공공데이터포털. https://www.data.go.kr</p>
                        <p class="citation-text">전북특별자치도 고창군. (2024). 고창군 석면조사건축물 현황 [데이터 세트]. 공공데이터포털. https://www.data.go.kr</p>
                        <a href="#" class="analysis-link mt-4" style="display: inline-flex; align-items: center; background: var(--bg-surface-hover); padding: 0.5rem 1rem; border-radius: 6px;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right: 8px;"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                            데이터 정제 및 병합 알고리즘 프로세스 로그 파일 (JSON) 다운로드
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </template>
    <script type="module" src="main.js?v=3"></script>
</body>
</html>
